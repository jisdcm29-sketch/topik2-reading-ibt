<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TOPIK II 읽기 유형별 문제지 출력</title>
  <style>
    :root {
      --blue: #0877ee;
      --dark-blue: #00408f;
      --light-blue: #eaf4ff;
      --line: #d7e2ef;
      --text: #17212b;
      --muted: #5d6b7a;
      --paper-width: 960px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Malgun Gothic", "Apple SD Gothic Neo", Arial, sans-serif;
      background: #f1f4f8;
      color: var(--text);
      line-height: 1.6;
    }

    .app-header {
      background: var(--blue);
      color: #fff;
      padding: 18px 24px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.12);
    }

    .app-header-inner {
      max-width: 1280px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
    }

    .app-header-text {
      min-width: 0;
    }

    .header-nav-button {
      flex: 0 0 auto;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 42px;
      padding: 9px 14px;
      border: 2px solid rgba(255, 255, 255, 0.9);
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.12);
      color: #ffffff;
      font-size: 14px;
      font-weight: 900;
      text-decoration: none;
      white-space: nowrap;
    }

    .header-nav-button:hover {
      background: #ffffff;
      color: var(--blue);
    }

    .app-header h1 {
      margin: 0;
      font-size: 26px;
      font-weight: 800;
    }

    .app-header p {
      margin: 4px 0 0;
      font-size: 14px;
      opacity: 0.92;
    }

    .screen-wrap {
      max-width: 1280px;
      margin: 24px auto 60px;
      padding: 0 20px;
      display: grid;
      grid-template-columns: 360px 1fr;
      gap: 22px;
      align-items: start;
    }

    .control-panel,
    .preview-panel {
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 14px;
      box-shadow: 0 4px 18px rgba(15, 35, 60, 0.08);
    }

    .control-panel {
      padding: 20px;
      position: sticky;
      top: 18px;
    }

    .control-panel h2,
    .preview-panel h2 {
      margin: 0 0 14px;
      color: var(--dark-blue);
      font-size: 20px;
    }

    .form-section {
      border-top: 1px solid var(--line);
      padding-top: 14px;
      margin-top: 14px;
    }

    .form-section:first-of-type {
      border-top: 0;
      padding-top: 0;
      margin-top: 0;
    }

    label {
      display: block;
      font-weight: 700;
      margin-bottom: 6px;
      color: #102d4d;
    }

    .hint {
      font-size: 12px;
      color: var(--muted);
      margin-top: 4px;
    }

    input[type="number"],
    input[type="text"],
    select {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #b9cce2;
      border-radius: 8px;
      font-size: 15px;
      font-family: inherit;
      background: #fff;
    }

    .inline-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 12px;
    }

    .check-line {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      margin: 9px 0;
      font-size: 14px;
      font-weight: 600;
      color: #1f344b;
    }

    .check-line input {
      margin-top: 5px;
    }

    .round-box {
      max-height: 130px;
      overflow: auto;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 8px 10px;
      background: #fafcff;
    }

    .button-row {
      display: grid;
      grid-template-columns: 1fr;
      gap: 8px;
      margin-top: 16px;
    }

    button {
      border: 0;
      border-radius: 9px;
      padding: 11px 14px;
      font-size: 15px;
      font-family: inherit;
      font-weight: 800;
      cursor: pointer;
    }

    .primary-btn {
      background: var(--blue);
      color: #fff;
    }

    .secondary-btn {
      border: 2px solid var(--blue);
      background: #fff;
      color: var(--blue);
    }

    .plain-btn {
      background: #eef3f9;
      color: #23364a;
    }

    .status-box {
      margin-top: 14px;
      padding: 12px;
      border-radius: 10px;
      background: var(--light-blue);
      border: 1px solid #b9dcff;
      color: #163b63;
      font-size: 14px;
      white-space: pre-line;
    }

    .warning {
      background: #fff8e7;
      border-color: #ffd98a;
      color: #5c3d00;
    }

    .preview-panel {
      padding: 20px;
      min-height: 620px;
    }

    #printArea {
      background: #fff;
    }

    .print-empty {
      padding: 60px 20px;
      text-align: center;
      color: var(--muted);
      border: 2px dashed var(--line);
      border-radius: 14px;
    }

    .paper {
      width: var(--paper-width);
      max-width: 100%;
      margin: 0 auto;
      background: #fff;
      color: #111;
    }

    .paper-title {
      border-bottom: 4px solid var(--dark-blue);
      padding-bottom: 12px;
      margin-bottom: 16px;
    }

    .paper-title h1 {
      margin: 0;
      color: var(--dark-blue);
      font-size: 28px;
    }

    .paper-title .meta {
      margin-top: 8px;
      color: #34495e;
      font-size: 14px;
    }

    .question-card,
    .question-set {
      border: 1px solid #dce5ef;
      border-radius: 12px;
      padding: 18px;
      margin: 16px 0;
      page-break-inside: avoid;
      break-inside: avoid;
      background: #fff;
    }

    .question-set {
      border-width: 2px;
    }

    .source-note {
      display: inline-block;
      padding: 4px 9px;
      margin-bottom: 8px;
      border-radius: 999px;
      background: #eef6ff;
      color: var(--dark-blue);
      font-size: 12px;
      font-weight: 800;
    }

    .set-heading {
      margin: 0 0 10px;
      color: var(--dark-blue);
      font-size: 18px;
    }

    .instruction {
      margin: 6px 0 12px;
      font-weight: 800;
      font-size: 16px;
    }

    .passage,
    .image-wrap,
    .insert-sentence,
    .sentence-list {
      border: 1px solid #e2e9f1;
      border-radius: 10px;
      padding: 14px 16px;
      margin: 10px 0 14px;
      background: #fbfdff;
    }

    .passage {
      white-space: pre-wrap;
      font-size: 15px;
      line-height: 1.9;
    }

    .image-wrap {
      text-align: center;
      background: #fff;
    }

    .image-wrap img {
      max-width: 92%;
      max-height: 430px;
      width: auto;
      height: auto;
      object-fit: contain;
      border: 1px solid #d7e2ef;
      border-radius: 8px;
    }

    .question-block {
      margin-top: 14px;
      padding-top: 12px;
      border-top: 1px solid #e5ecf4;
    }

    .question-title {
      margin: 0 0 10px;
      font-size: 17px;
      font-weight: 900;
    }

    .options-label {
      margin: 10px 0 4px;
      font-size: 14px;
      font-weight: 900;
      color: var(--dark-blue);
    }

    .options {
      display: grid;
      grid-template-columns: 1fr;
      gap: 7px;
      margin-top: 8px;
      padding-left: 0;
      list-style: none;
    }

    .options li {
      border: 1px solid #d5e0ec;
      border-radius: 9px;
      padding: 8px 10px;
      font-size: 15px;
    }

    .option-number {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 24px;
      height: 24px;
      margin-right: 8px;
      border-radius: 50%;
      background: #eef6ff;
      color: var(--dark-blue);
      font-weight: 900;
      font-size: 13px;
    }

    .underlined {
      text-decoration: underline;
      text-decoration-thickness: 2px;
      text-underline-offset: 4px;
      font-weight: 700;
    }

    .sentence-list .sentence-item {
      margin: 7px 0;
      padding: 8px 10px;
      border-radius: 8px;
      background: #fff;
      border: 1px dashed #c9d8e8;
    }

    .sentence-label {
      font-weight: 900;
      color: var(--dark-blue);
      margin-right: 6px;
    }

    .answer-section {
      margin-top: 32px;
      page-break-before: always;
    }

    .answer-section h2 {
      color: var(--dark-blue);
      border-bottom: 3px solid var(--dark-blue);
      padding-bottom: 8px;
    }

    .answer-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }

    .answer-table th,
    .answer-table td {
      border: 1px solid #cad6e4;
      padding: 7px 8px;
      text-align: center;
    }

    .answer-table th {
      background: #eef6ff;
      color: var(--dark-blue);
    }

    .answer-table td:nth-child(5),
    .answer-table td:nth-child(6) {
      text-align: left;
    }

    @media (max-width: 980px) {
      .screen-wrap {
        grid-template-columns: 1fr;
      }

      .control-panel {
        position: static;
      }
    }

    @media (max-width: 640px) {
      .app-header-inner {
        align-items: flex-start;
        flex-direction: column;
      }

      .header-nav-button {
        width: 100%;
      }
    }

    @media print {
      body {
        background: #fff;
      }

      .app-header,
      .header-nav-button,
      .control-panel,
      .preview-panel > h2,
      .no-print {
        display: none !important;
      }

      .screen-wrap,
      .preview-panel {
        display: block;
        max-width: none;
        margin: 0;
        padding: 0;
        border: 0;
        box-shadow: none;
      }

      .paper {
        width: 100%;
        margin: 0;
      }

      .question-card,
      .question-set {
        box-shadow: none;
      }

      @page {
        size: A4;
        margin: 14mm 12mm;
      }
    }
  </style>
</head>
<body>
  <header class="app-header">
    <div class="app-header-inner">
      <div class="app-header-text">
        <h1>TOPIK II 읽기 유형별 문제지 출력</h1>
        <p>TOPIK II PBT 읽기 1~50번 기준 · 교사용 출력 도구</p>
      </div>
      <a class="header-nav-button no-print" href="../reading-test/index.html?v=from_practice_print">
        인증 화면으로 돌아가기
      </a>
    </div>
  </header>

  <main class="screen-wrap">
    <aside class="control-panel no-print">
      <h2>출력 조건</h2>

      <section class="form-section">
        <div class="inline-grid">
          <div>
            <label for="startNumber">원본 시작 번호</label>
            <input id="startNumber" type="number" min="1" max="50" value="1" />
          </div>
          <div>
            <label for="endNumber">원본 끝 번호</label>
            <input id="endNumber" type="number" min="1" max="50" value="4" />
          </div>
        </div>
        <div class="hint">예: 1~4번 유형만 모으려면 시작 1, 끝 4로 설정합니다.</div>
      </section>

      <section class="form-section">
        <label for="questionCount">출력 문항 수</label>
        <input id="questionCount" type="number" min="0" value="0" />
        <div class="hint">0이면 가능한 전체 문항을 출력합니다. 현재 7회차 기준 1~4번은 28문항입니다.</div>

        <label class="check-line">
          <input id="allowRepeat" type="checkbox" />
          부족하면 중복을 허용하여 지정 문항 수를 맞춤
        </label>
      </section>

      <section class="form-section">
        <label for="sortMode">출력 순서</label>
        <select id="sortMode">
          <option value="round">회차·원본 번호순</option>
          <option value="random">랜덤 섞기</option>
        </select>
      </section>

      <section class="form-section">
        <label>출제 회차</label>
        <div id="roundBox" class="round-box">
          문제은행을 불러오는 중입니다.
        </div>
      </section>

      <section class="form-section">
        <label class="check-line">
          <input id="showSource" type="checkbox" checked />
          문항에 원본 회차·원본 번호 표시
        </label>
        <label class="check-line">
          <input id="showAnswers" type="checkbox" />
          마지막에 정답표 포함
        </label>
        <label class="check-line">
          <input id="teacherMode" type="checkbox" />
          문제 옆에 정답 표시
        </label>
      </section>

      <section class="form-section">
        <label for="paperTitle">문제지 제목</label>
        <input id="paperTitle" type="text" value="TOPIK II 읽기 원본 1~4번 유형별 문제지" />
      </section>

      <div class="button-row">
        <button id="generateBtn" type="button" class="primary-btn">문제지 미리보기 생성</button>
        <button id="printBtn" type="button" class="secondary-btn">PDF로 인쇄 / 저장</button>
        <button id="resetBtn" type="button" class="plain-btn">초기화</button>
      </div>

      <div id="statusBox" class="status-box">문제은행을 불러오면 사용 가능합니다.</div>
    </aside>

    <section class="preview-panel">
      <h2>미리보기</h2>
      <div id="printArea">
        <div class="print-empty">왼쪽에서 조건을 정한 뒤 [문제지 미리보기 생성]을 누르세요.</div>
      </div>
    </section>
  </main>

  <script src="./practice-print.js?v=topik2_practice_print_final_1"></script>
</body>
</html>
