<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TOPIK II 읽기 유형별 문제지 출력</title>
  <style>
    :root {
      --blue: #0877ee;
      --dark-blue: #00408f;
      --light-blue: #eaf4ff;
      --line: #d7e2ef;
      --text: #17212b;
      --muted: #5d6b7a;
      --paper-width: 960px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Malgun Gothic", "Apple SD Gothic Neo", Arial, sans-serif;
      background: #f1f4f8;
      color: var(--text);
      line-height: 1.6;
    }

    .app-header {
      background: var(--blue);
      color: #fff;
      padding: 18px 24px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.12);
    }

    .app-header-inner {
      max-width: 1280px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
    }

    .app-header-text {
      min-width: 0;
    }

    .header-nav-button {
      flex: 0 0 auto;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 42px;
      padding: 9px 14px;
      border: 2px solid rgba(255, 255, 255, 0.9);
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.12);
      color: #ffffff;
      font-size: 14px;
      font-weight: 900;
      text-decoration: none;
      white-space: nowrap;
    }

    .header-nav-button:hover {
      background: #ffffff;
      color: var(--blue);
    }

    .app-header h1 {
      margin: 0;
      font-size: 26px;
      font-weight: 800;
    }

    .app-header p {
      margin: 4px 0 0;
      font-size: 14px;
      opacity: 0.92;
    }

    .screen-wrap {
      max-width: 1280px;
      margin: 24px auto 60px;
      padding: 0 20px;
      display: grid;
      grid-template-columns: 360px 1fr;
      gap: 22px;
      align-items: start;
    }

    .control-panel,
    .preview-panel {
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 14px;
      box-shadow: 0 4px 18px rgba(15, 35, 60, 0.08);
    }

    .control-panel {
      padding: 20px;
      position: sticky;
      top: 18px;
    }

    .control-panel h2,
    .preview-panel h2 {
      margin: 0 0 14px;
      color: var(--dark-blue);
      font-size: 20px;
    }

    .form-section {
      border-top: 1px solid var(--line);
      padding-top: 14px;
      margin-top: 14px;
    }

    .form-section:first-of-type {
      border-top: 0;
      padding-top: 0;
      margin-top: 0;
    }

    label {
      display: block;
      font-weight: 700;
      margin-bottom: 6px;
      color: #102d4d;
    }

    .hint {
      font-size: 12px;
      color: var(--muted);
      margin-top: 4px;
    }

    input[type="number"],
    input[type="text"],
    select {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #b9cce2;
      border-radius: 8px;
      font-size: 15px;
      font-family: inherit;
      background: #fff;
    }

    .inline-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 12px;
    }

    .check-line {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      margin: 9px 0;
      font-size: 14px;
      font-weight: 600;
      color: #1f344b;
    }

    .check-line input {
      margin-top: 5px;
    }

    .round-box {
      max-height: 130px;
      overflow: auto;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 8px 10px;
      background: #fafcff;
    }

    .button-row {
      display: grid;
      grid-template-columns: 1fr;
      gap: 8px;
      margin-top: 16px;
    }

    button {
      border: 0;
      border-radius: 9px;
      padding: 11px 14px;
      font-size: 15px;
      font-family: inherit;
      font-weight: 800;
      cursor: pointer;
    }

    .primary-btn {
      background: var(--blue);
      color: #fff;
    }

    .secondary-btn {
      border: 2px solid var(--blue);
      background: #fff;
      color: var(--blue);
    }

    .plain-btn {
      background: #eef3f9;
      color: #23364a;
    }

    .status-box {
      margin-top: 14px;
      padding: 12px;
      border-radius: 10px;
      background: var(--light-blue);
      border: 1px solid #b9dcff;
      color: #163b63;
      font-size: 14px;
      white-space: pre-line;
    }

    .warning {
      background: #fff8e7;
      border-color: #ffd98a;
      color: #5c3d00;
    }

    .preview-panel {
      padding: 20px;
      min-height: 620px;
    }

    #printArea {
      background: #fff;
    }

    .print-empty {
      padding: 60px 20px;
      text-align: center;
      color: var(--muted);
      border: 2px dashed var(--line);
      border-radius: 14px;
    }

    .paper {
      width: var(--paper-width);
      max-width: 100%;
      margin: 0 auto;
      background: #fff;
      color: #111;
    }

    .paper-title {
      border-bottom: 4px solid var(--dark-blue);
      padding-bottom: 12px;
      margin-bottom: 16px;
    }

    .paper-title h1 {
      margin: 0;
      color: var(--dark-blue);
      font-size: 28px;
    }

    .paper-title .meta {
      margin-top: 8px;
      color: #34495e;
      font-size: 14px;
    }

    .question-card,
    .question-set {
      border: 1px solid #dce5ef;
      border-radius: 12px;
      padding: 18px;
      margin: 16px 0;
      page-break-inside: avoid;
      break-inside: avoid;
      background: #fff;
    }

    .question-set {
      border-width: 2px;
    }

    .source-note {
      display: inline-block;
      padding: 4px 9px;
      margin-bottom: 8px;
      border-radius: 999px;
      background: #eef6ff;
      color: var(--dark-blue);
      font-size: 12px;
      font-weight: 800;
    }

    .set-heading {
      margin: 0 0 10px;
      color: var(--dark-blue);
      font-size: 18px;
    }

    .instruction {
      margin: 6px 0 12px;
      font-weight: 800;
      font-size: 16px;
    }

    .passage,
    .image-wrap,
    .insert-sentence,
    .sentence-list {
      border: 1px solid #e2e9f1;
      border-radius: 10px;
      padding: 14px 16px;
      margin: 10px 0 14px;
      background: #fbfdff;
    }

    .passage {
      white-space: pre-wrap;
      font-size: 15px;
      line-height: 1.9;
    }

    .image-wrap {
      text-align: center;
      background: #fff;
    }

    .image-wrap img {
      max-width: 92%;
      max-height: 430px;
      width: auto;
      height: auto;
      object-fit: contain;
      border: 1px solid #d7e2ef;
      border-radius: 8px;
    }

    .question-block {
      margin-top: 14px;
      padding-top: 12px;
      border-top: 1px solid #e5ecf4;
    }

    .question-title {
      margin: 0 0 10px;
      font-size: 17px;
      font-weight: 900;
    }

    .options-label {
      margin: 10px 0 4px;
      font-size: 14px;
      font-weight: 900;
      color: var(--dark-blue);
    }

    .options {
      display: grid;
      grid-template-columns: 1fr;
      gap: 7px;
      margin-top: 8px;
      padding-left: 0;
      list-style: none;
    }

    .options li {
      border: 1px solid #d5e0ec;
      border-radius: 9px;
      padding: 8px 10px;
      font-size: 15px;
    }

    .option-number {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 24px;
      height: 24px;
      margin-right: 8px;
      border-radius: 50%;
      background: #eef6ff;
      color: var(--dark-blue);
      font-weight: 900;
      font-size: 13px;
    }

    .underlined {
      text-decoration: underline;
      text-decoration-thickness: 2px;
      text-underline-offset: 4px;
      font-weight: 700;
    }

    .sentence-list .sentence-item {
      margin: 7px 0;
      padding: 8px 10px;
      border-radius: 8px;
      background: #fff;
      border: 1px dashed #c9d8e8;
    }

    .sentence-label {
      font-weight: 900;
      color: var(--dark-blue);
      margin-right: 6px;
    }

    .answer-section {
      margin-top: 32px;
      page-break-before: always;
    }

    .answer-section h2 {
      color: var(--dark-blue);
      border-bottom: 3px solid var(--dark-blue);
      padding-bottom: 8px;
    }

    .answer-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }

    .answer-table th,
    .answer-table td {
      border: 1px solid #cad6e4;
      padding: 7px 8px;
      text-align: center;
    }

    .answer-table th {
      background: #eef6ff;
      color: var(--dark-blue);
    }

    .answer-table td:nth-child(5),
    .answer-table td:nth-child(6) {
      text-align: left;
    }

    @media (max-width: 980px) {
      .screen-wrap {
        grid-template-columns: 1fr;
      }

      .control-panel {
        position: static;
      }
    }

    @media (max-width: 640px) {
      .app-header-inner {
        align-items: flex-start;
        flex-direction: column;
      }

      .header-nav-button {
        width: 100%;
      }
    }

    @media print {
      body {
        background: #fff;
      }

      .app-header,
      .header-nav-button,
      .control-panel,
      .preview-panel > h2,
      .no-print {
        display: none !important;
      }

      .screen-wrap,
      .preview-panel {
        display: block;
        max-width: none;
        margin: 0;
        padding: 0;
        border: 0;
        box-shadow: none;
      }

      .paper {
        width: 100%;
        margin: 0;
      }

      .question-card,
      .question-set {
        box-shadow: none;
      }

      @page {
        size: A4;
        margin: 14mm 12mm;
      }
    }

    /* =========================================================
       compact print override v5 - common set flow fix
       학생 제공용 유형별 문제지: 텍스트 문항은 촘촘하게, 이미지 문항은 잘리지 않게
       ========================================================= */

    @media print {
      @page {
        size: A4 portrait;
        margin: 8mm 8mm 9mm 8mm;
      }

      html,
      body {
        margin: 0 !important;
        padding: 0 !important;
        background: #fff !important;
        color: #111 !important;
        font-size: 9.4pt !important;
        line-height: 1.32 !important;
        -webkit-print-color-adjust: exact !important;
        print-color-adjust: exact !important;
        text-rendering: geometricPrecision;
      }

      .app-header,
      .header-nav-button,
      .control-panel,
      .preview-panel > h2,
      .no-print {
        display: none !important;
      }

      .screen-wrap,
      .preview-panel {
        display: block !important;
        max-width: none !important;
        width: auto !important;
        margin: 0 !important;
        padding: 0 !important;
        border: 0 !important;
        box-shadow: none !important;
        background: #fff !important;
      }

      #printArea,
      .paper {
        width: 100% !important;
        max-width: none !important;
        margin: 0 !important;
        padding: 0 !important;
        background: #fff !important;
      }

      .paper-title {
        margin: 0 0 4.5mm 0 !important;
        padding: 0 0 2mm 0 !important;
        border-bottom: 1.2pt solid #111 !important;
      }

      .paper-title h1 {
        margin: 0 !important;
        color: #111 !important;
        font-size: 15pt !important;
        line-height: 1.18 !important;
        font-weight: 900 !important;
      }

      .paper-title .meta {
        margin-top: 1.5mm !important;
        color: #333 !important;
        font-size: 8.3pt !important;
        line-height: 1.22 !important;
      }

      .question-card,
      .question-set {
        margin: 0 0 3.2mm 0 !important;
        padding: 0 0 2.6mm 0 !important;
        border: 0 !important;
        border-bottom: 0.35pt solid #d0d7de !important;
        border-radius: 0 !important;
        background: #fff !important;
        box-shadow: none !important;
      }

      .question-card {
        break-inside: avoid !important;
        page-break-inside: avoid !important;
      }

      /* 공통 지문 세트 전체를 한 덩어리로 막으면 큰 빈 공간이 생기므로 세트는 나눔 허용 */
      .question-set {
        break-inside: auto !important;
        page-break-inside: auto !important;
      }

      .question-block {
        margin-top: 2.2mm !important;
        padding-top: 1.8mm !important;
        border-top: 0.3pt solid #e1e4e8 !important;
        break-inside: avoid !important;
        page-break-inside: avoid !important;
      }

      .source-note {
        display: block !important;
        margin: 0 0 1mm 0 !important;
        padding: 0 !important;
        border-radius: 0 !important;
        background: transparent !important;
        color: #003f8f !important;
        font-size: 8.8pt !important;
        line-height: 1.18 !important;
        font-weight: 900 !important;
      }

      .set-heading {
        margin: 0 0 1.5mm 0 !important;
        color: #003f8f !important;
        font-size: 10.8pt !important;
        line-height: 1.2 !important;
        font-weight: 900 !important;
      }

      .instruction {
        margin: 0 0 1.6mm 0 !important;
        font-size: 9.2pt !important;
        line-height: 1.25 !important;
        font-weight: 900 !important;
      }

      .question-title {
        margin: 0 0 1.6mm 0 !important;
        font-size: 9.8pt !important;
        line-height: 1.28 !important;
        font-weight: 900 !important;
      }

      .passage,
      .insert-sentence,
      .sentence-list {
        margin: 1.4mm 0 1.8mm 0 !important;
        padding: 1.8mm 2.2mm !important;
        border: 0.35pt solid #cfd8e3 !important;
        border-radius: 0 !important;
        background: #fff !important;
        white-space: pre-wrap !important;
        font-size: 9.2pt !important;
        line-height: 1.34 !important;
        font-weight: 500 !important;
      }

      .image-wrap {
        margin: 1.4mm 0 1.8mm 0 !important;
        padding: 0.8mm !important;
        border: 0.35pt solid #cfd8e3 !important;
        border-radius: 0 !important;
        background: #fff !important;
        text-align: center !important;
        break-inside: avoid !important;
        page-break-inside: avoid !important;
      }

      .image-wrap img {
        max-width: 72% !important;
        max-height: 52mm !important;
        width: auto !important;
        height: auto !important;
        object-fit: contain !important;
        border: 0 !important;
        border-radius: 0 !important;
      }

      .options-label {
        margin: 1.3mm 0 0.8mm 0 !important;
        font-size: 8.8pt !important;
        line-height: 1.2 !important;
        font-weight: 900 !important;
        color: #003f8f !important;
      }

      .options {
        display: grid !important;
        grid-template-columns: repeat(2, minmax(0, 1fr)) !important;
        column-gap: 7mm !important;
        row-gap: 0.65mm !important;
        margin: 0 !important;
        padding-left: 0 !important;
        list-style: none !important;
      }

      .options li {
        margin: 0 !important;
        padding: 0 !important;
        border: 0 !important;
        border-radius: 0 !important;
        background: #fff !important;
        font-size: 9pt !important;
        line-height: 1.26 !important;
        font-weight: 500 !important;
        break-inside: avoid !important;
        page-break-inside: avoid !important;
      }

      .option-number {
        display: inline !important;
        width: auto !important;
        height: auto !important;
        margin-right: 1.5mm !important;
        border-radius: 0 !important;
        background: transparent !important;
        color: #003f8f !important;
        font-size: 9pt !important;
        font-weight: 900 !important;
      }

      .underlined {
        text-decoration-thickness: 1.2px !important;
        text-underline-offset: 2px !important;
        font-weight: 800 !important;
      }

      .sentence-list .sentence-item {
        margin: 1mm 0 !important;
        padding: 1.3mm 1.8mm !important;
        border: 0.3pt dashed #cfd8e3 !important;
        border-radius: 0 !important;
        background: #fff !important;
        font-size: 9pt !important;
        line-height: 1.28 !important;
      }

      /* 이미지/그래프/긴 지문이 있는 문항은 선택지를 1열로 유지해 가독성 확보 */
      .question-card:has(.image-wrap) .options,
      .question-set:has(.image-wrap) .options,
      .question-card:has(.passage) .options.long-options,
      .question-set:has(.passage) .options.long-options {
        grid-template-columns: 1fr !important;
      }

      .answer-section {
        margin-top: 6mm !important;
        page-break-before: always !important;
      }

      .answer-section h2 {
        margin: 0 0 3mm 0 !important;
        padding-bottom: 1.5mm !important;
        color: #111 !important;
        border-bottom: 1pt solid #111 !important;
        font-size: 13pt !important;
      }

      .answer-table {
        width: 100% !important;
        border-collapse: collapse !important;
        font-size: 8pt !important;
        line-height: 1.18 !important;
      }

      .answer-table th,
      .answer-table td {
        padding: 1.1mm 1.4mm !important;
        border: 0.3pt solid #cfd8e3 !important;
      }

      .answer-table th {
        background: #eef6ff !important;
        color: #003f8f !important;
        font-weight: 900 !important;
      }

      p {
        margin-top: 0 !important;
        margin-bottom: 1mm !important;
      }

      br + br {
        display: none !important;
      }
    }


    /* =========================================================
       compact print image override v3
       학생 배부용: 이미지 문항을 조금 더 작게 출력
       ========================================================= */
    @media print {
      .image-wrap {
        margin: 1.4mm 0 1.8mm 0 !important;
        padding: 0.8mm !important;
      }

      .image-wrap img,
      .question-image,
      .figure-image,
      .graph-image {
        max-width: 72% !important;
        max-height: 52mm !important;
        width: auto !important;
        height: auto !important;
        object-fit: contain !important;
      }

      .question-card:has(.image-wrap),
      .question-item:has(.image-wrap),
      .image-question,
      .graph-question,
      .table-question {
        margin-bottom: 3.4mm !important;
        padding-bottom: 2.8mm !important;
      }
    }


    /* =========================================================
       compact print image override v4
       학생 배부용: 이미지 문항 크기 추가 축소
       ========================================================= */
    @media print {
      .image-wrap {
        width: 82% !important;
        max-width: 82% !important;
        margin: 1.2mm auto 1.6mm auto !important;
        padding: 0.7mm !important;
        text-align: center !important;
      }

      .image-wrap img,
      .question-image,
      .figure-image,
      .graph-image {
        max-width: 72% !important;
        max-height: 52mm !important;
        width: auto !important;
        height: auto !important;
        object-fit: contain !important;
      }

      .question-card:has(.image-wrap),
      .question-item:has(.image-wrap),
      .image-question,
      .graph-question,
      .table-question {
        margin-bottom: 2.8mm !important;
        padding-bottom: 2.2mm !important;
      }
    }


    /* =========================================================
       compact print common-set flow override v5
       이미지 크기는 v4 유지, 공통 지문 세트의 마지막 문항만 다음 장으로 밀리는 현상 완화
       ========================================================= */
    @media print {
      /*
        공통 지문 세트 전체를 한 덩어리로 묶지 않는다.
        마지막 소문항이 혼자 다음 페이지로 넘어가는 현상을 줄이기 위한 규칙이다.
      */
      .question-set {
        break-inside: auto !important;
        page-break-inside: auto !important;
        margin-bottom: 2.4mm !important;
        padding-bottom: 1.8mm !important;
      }

      .question-set .question-block {
        break-inside: auto !important;
        page-break-inside: auto !important;
        margin-top: 1.1mm !important;
        padding-top: 1.0mm !important;
        border-top: 0.25pt solid #e1e4e8 !important;
      }

      .question-set .passage,
      .question-set .insert-sentence,
      .question-set .sentence-list {
        margin: 0.9mm 0 1.1mm 0 !important;
        padding: 1.2mm 1.6mm !important;
        line-height: 1.27 !important;
      }

      .question-set .question-title {
        margin-bottom: 0.9mm !important;
        line-height: 1.22 !important;
      }

      .question-set .options-label {
        margin: 0.8mm 0 0.4mm 0 !important;
      }

      .question-set .options {
        row-gap: 0.35mm !important;
      }

      .question-set .options li {
        line-height: 1.18 !important;
      }

      /*
        일반 텍스트 문항은 여전히 문항 단위로 크게 끊기지 않게 하되,
        공통 지문 세트 안의 소문항은 페이지 하단에 들어갈 수 있으면 들어가도록 한다.
      */
      .question-card:not(:has(.image-wrap)) {
        break-inside: avoid !important;
        page-break-inside: avoid !important;
      }

      /*
        이미지 문항은 v4 크기를 유지하고, 페이지 중간에서 이미지가 잘리는 것은 계속 방지한다.
      */
      .question-card:has(.image-wrap),
      .image-question,
      .graph-question,
      .table-question {
        break-inside: avoid !important;
        page-break-inside: avoid !important;
      }
    }

  </style>
</head>
<body>
  <header class="app-header">
    <div class="app-header-inner">
      <div class="app-header-text">
        <h1>TOPIK II 읽기 유형별 문제지 출력</h1>
        <p>TOPIK II PBT 읽기 1~50번 기준 · 교사용 출력 도구</p>
      </div>
      <a class="header-nav-button no-print" href="../reading-test/index.html?v=from_practice_print">
        인증 화면으로 돌아가기
      </a>
    </div>
  </header>

  <main class="screen-wrap">
    <aside class="control-panel no-print">
      <h2>출력 조건</h2>

      <section class="form-section">
        <div class="inline-grid">
          <div>
            <label for="startNumber">원본 시작 번호</label>
            <input id="startNumber" type="number" min="1" max="50" value="1" />
          </div>
          <div>
            <label for="endNumber">원본 끝 번호</label>
            <input id="endNumber" type="number" min="1" max="50" value="4" />
          </div>
        </div>
        <div class="hint">예: 1~4번 유형만 모으려면 시작 1, 끝 4로 설정합니다.</div>
      </section>

      <section class="form-section">
        <label for="questionCount">출력 문항 수</label>
        <input id="questionCount" type="number" min="0" value="0" />
        <div class="hint">0이면 가능한 전체 문항을 출력합니다. 현재 7회차 기준 1~4번은 28문항입니다.</div>

        <label class="check-line">
          <input id="allowRepeat" type="checkbox" />
          부족하면 중복을 허용하여 지정 문항 수를 맞춤
        </label>
      </section>

      <section class="form-section">
        <label for="sortMode">출력 순서</label>
        <select id="sortMode">
          <option value="round">회차·원본 번호순</option>
          <option value="random">랜덤 섞기</option>
        </select>
      </section>

      <section class="form-section">
        <label>출제 회차</label>
        <div id="roundBox" class="round-box">
          문제은행을 불러오는 중입니다.
        </div>
      </section>

      <section class="form-section">
        <label class="check-line">
          <input id="showSource" type="checkbox" checked />
          문항에 원본 회차·원본 번호 표시
        </label>
        <label class="check-line">
          <input id="showAnswers" type="checkbox" />
          마지막에 정답표 포함
        </label>
        <label class="check-line">
          <input id="teacherMode" type="checkbox" />
          문제 옆에 정답 표시
        </label>
      </section>

      <section class="form-section">
        <label for="paperTitle">문제지 제목</label>
        <input id="paperTitle" type="text" value="TOPIK II 읽기 원본 1~4번 유형별 문제지" />
      </section>

      <div class="button-row">
        <button id="generateBtn" type="button" class="primary-btn">문제지 미리보기 생성</button>
        <button id="printBtn" type="button" class="secondary-btn">PDF로 인쇄 / 저장</button>
        <button id="resetBtn" type="button" class="plain-btn">초기화</button>
      </div>

      <div id="statusBox" class="status-box">문제은행을 불러오면 사용 가능합니다.</div>
    </aside>

    <section class="preview-panel">
      <h2>미리보기</h2>
      <div id="printArea">
        <div class="print-empty">왼쪽에서 조건을 정한 뒤 [문제지 미리보기 생성]을 누르세요.</div>
      </div>
    </section>
  </main>

  <script src="./practice-print.js?v=topik2_practice_print_compact_v5"></script>
</body>
</html>
